type: module
name: Mod1
in: [a, b, sel_b1, sel_b2]
out: [out_assign, out_always]
op:
  - type: and
    in: [Mod1.sel_b1, Mod1.sel_b2]
    out: [Mux1.__1]
  - type: and
    in: [Mod1.sel_b1, Mod1.sel_b2]
    out: [Mux2.__1]
  - type: multiplexer
    name: Mux1
    in: [__1, Mod1.a, Mod1.b]
    out: [Mod1.out_assign]
    op:
      - type: bool
        in: [Mod1.a]
        out: [0]
      - type: bool
        in: [Mod1.b]
        out: [1]
      - type: selector
        in: [Mux1.__1]
        out: [Mod1.out_assign]
  - type: multiplexer
    name: Mux2
    in: [__1, Mod1.a, Mod1.b]
    out: [Mod1.out_always]
    op:
      - type: bool
        in: [Mod1.a]
        out: [0]
      - type: bool
        in: [Mod1.b]
        out: [1]
      - type: selector
        in: [Mux2.__1]
        out: [Mod1.out_always]
  